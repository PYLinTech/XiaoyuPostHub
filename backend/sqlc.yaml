version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema:  "../migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "db/generated"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        emit_prepared_queries: false
        emit_empty_slices: true
